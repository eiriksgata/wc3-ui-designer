name: MCP CI

on:
  pull_request:
  schedule:
    - cron: "0 2 * * *"

jobs:
  mcp_smoke:
    name: MCP Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run MCP smoke checks
        run: yarn mcp:ci-smoke

  mcp_strict_runtime:
    name: MCP Strict Runtime
    if: github.event_name == 'schedule'
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run strict runtime smoke checks
        run: yarn mcp:ci-smoke:strict-runtime
